DATALOADER:
  TRAIN:
    BATCH_SIZE: 64
    NUM_INSTANCES: 4
    SAMPLER: "RandomIdentitySampler"
  TEST:
    BATCH_SIZE: 64
  NUM_WORKERS: 8

INPUT:
  SIZE: (256, 256)
  INTERPOLATION: "bicubic"
  PIXEL_MEAN: [0.485, 0.456, 0.406]
  PIXEL_STD: [0.229, 0.224, 0.225]
  TRANSFORMS: ["random_resized_crop", "random_flip", "normalize", "color_jitter", "random_erase"]
  RRCROP_SCALE: (0.15, 0.60)

OPTIM:
  NAME: "adamw"
  LR: 0.002
  MAX_EPOCH: 50
  LR_SCHEDULER: "Cosine"
  WEIGHT_DECAY: 0.01
  WARMUP_EPOCH: 5
  WARMUP_TYPE: "linear"
  DOMAIN_OPTIM:
    DOMAIN_LR_MULTIPLIERS: [1.0, 1.0]
    DOMAIN_SCHEDULERS: ["Cosine", "Cosine"]

TRAIN:
  PRINT_FREQ: 60
  MIXED_PRECISION: True

MODEL:
  NAME: Adapter
  METRIC_LOSS_TYPE: "triplet"
  NO_MARGIN: False
  IF_LABELSMOOTH: "on"
  Day_Night_Adapter: True
  TRIPLET_LOSS_WEIGHT: 1.5
  Adapter:
    # REQUIRED: path to the downloaded DINOv3 checkpoint.
    WEIGHT_PATH: "REQUIRED_PATH_TO_DINOV3_WEIGHTS"
    BACKBONE: "dinov3_vith16plus"
    # REQUIRED: path to the local DINOv3 torch.hub repository.
    REPO: "REQUIRED_PATH_TO_DINOV3_REPO"

SOLVER:
  MARGIN: 0.3

TEST:
  EVAL_PERIOD: 5
  VISUALIZE:
    ENABLED: False
    NUM_QUERIES: 26
    TOPK: 5
    SAME_DOMAIN_ONLY: True
    OUTPUT_SUBDIR: "rank_visualizations"

WANDB:
  ENABLED: False
  PROJECT: "swift"
  RUN_NAME: ""
